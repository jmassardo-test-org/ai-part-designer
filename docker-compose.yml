# AI Part Designer - Local Development
# Run with: docker compose up
#
# For Ollama (FREE local AI):
#   1. Install Ollama: https://ollama.ai
#   2. Pull model: ollama pull llama3.2
#   3. Start Ollama: ollama serve
#   4. Set AI_PROVIDER=ollama in .env
#   5. Run: docker compose up

services:
  # ============================================================================
  # Infrastructure Services
  # ============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: ai-part-designer-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-assemblematic_ai}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai-part-designer-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO - S3-compatible object storage (cloud-agnostic)
  minio:
    image: minio/minio:latest
    container_name: ai-part-designer-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Create default bucket on startup
  minio-init:
    image: minio/mc:latest
    container_name: ai-part-designer-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set minio http://minio:9000 minioadmin minioadmin;
      mc mb minio/ai-part-designer-dev --ignore-existing;
      mc anonymous set download minio/ai-part-designer-dev/public;
      exit 0;
      "

  # ============================================================================
  # Application Services
  # ============================================================================
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: ai-part-designer-api
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=development
      - DEBUG=true
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=${POSTGRES_DB:-assemblematic_ai}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - STORAGE_BACKEND=minio
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_BUCKET=ai-part-designer-dev
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_REGION=us-east-1
      - SECRET_KEY=development-secret-key-change-in-production
      - JWT_SECRET_KEY=jwt-development-secret
      - CORS_ORIGINS=["http://localhost:5173","http://localhost:3000"]
      # AI Provider (openai, ollama, anthropic, azure)
      - AI_PROVIDER=${AI_PROVIDER:-ollama}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-not-used}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT:-}
      - AZURE_OPENAI_DEPLOYMENT=${AZURE_OPENAI_DEPLOYMENT:-}
    volumes:
      - ./backend:/app
      - backend_cache:/app/.cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Worker service - uses backend codebase with Celery
  # Start with: docker compose --profile workers up
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: ai-part-designer-worker
    environment:
      - APP_ENV=development
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=${POSTGRES_DB:-assemblematic_ai}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - STORAGE_BACKEND=minio
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_BUCKET=ai-part-designer-dev
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_REGION=us-east-1
      # AI Provider - default to Ollama for local dev
      - AI_PROVIDER=${AI_PROVIDER:-ollama}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-not-used}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
    volumes:
      - ./backend:/app
      - worker_cache:/app/.cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: celery -A app.worker.celery worker --loglevel=info --concurrency=2
    profiles:
      - workers  # Only start with --profile workers

  worker-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: ai-part-designer-worker-beat
    environment:
      - APP_ENV=development
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: celery -A app.worker.celery beat --loglevel=info
    profiles:
      - full  # Only start with --profile full

  flower:
    image: mher/flower:2.0
    container_name: ai-part-designer-flower
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis
    command: celery --broker=redis://redis:6379/0 flower --port=5555
    profiles:
      - monitoring

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: ai-part-designer-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
      - VITE_WS_URL=ws://localhost:8000/ws
      - VITE_API_PROXY_TARGET=http://api:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      api:
        condition: service_healthy
    command: npm run dev -- --host

# ============================================================================
# Volumes
# ============================================================================
volumes:
  postgres_data:
  redis_data:
  minio_data:
  backend_cache:
  worker_cache:
  frontend_node_modules:

# ============================================================================
# Networks
# ============================================================================
networks:
  default:
    name: ai-part-designer-network
