<source>
  @type forward
  @id forward_input
  port 24224
  bind 0.0.0.0
</source>

# Parse logs from AI Part Designer containers
<filter docker.ai-part-designer-**>
  @type parser
  key_name log
  reserve_data true
  <parse>
    @type json
    time_key timestamp
    time_format %Y-%m-%dT%H:%M:%S.%L%z
  </parse>
</filter>

# Enhance API logs with request tracking
<filter docker.ai-part-designer-api>
  @type record_transformer
  enable_ruby true
  <record>
    component "backend-api"
    has_request_context ${record.dig("request_id") ? true : false}
  </record>
</filter>

# Tag worker logs separately
<filter docker.ai-part-designer-worker>
  @type record_transformer
  <record>
    component "celery-worker"
  </record>
</filter>

# Extract performance metrics from CAD generation
<filter docker.**>
  @type grep
  <regexp>
    key event
    pattern /generation|cad_model/
  </regexp>
</filter>

# Send to Elasticsearch with daily rotation
<match docker.ai-part-designer-**>
  @type elasticsearch
  @id elasticsearch_output
  host elasticsearch
  port 9200
  
  # Index naming based on date
  logstash_format true
  logstash_prefix ai-part-designer
  logstash_dateformat %Y.%m.%d
  
  include_tag_key true
  tag_key container_source
  
  # Buffer configuration
  <buffer>
    @type file
    path /fluentd/buffer/ai-part-designer
    flush_interval 5s
    chunk_limit_size 2M
    retry_max_interval 30s
    retry_forever false
    retry_max_times 10
  </buffer>
</match>

# Catch-all for debugging
<match **>
  @type stdout
</match>
