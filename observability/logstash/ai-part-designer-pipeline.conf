# Alternative pipeline using Logstash instead of Fluentd
# Enable by starting with: docker compose -f docker-compose.yml -f docker-compose.observability.yml --profile logstash up

input {
  tcp {
    port => 5044
    codec => json_lines
    id => "tcp_json_input"
  }
}

filter {
  # Application already outputs structured JSON from structlog
  # Just need to ensure timestamp is properly parsed
  
  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601", "yyyy-MM-dd'T'HH:mm:ss.SSSSSSZ"]
      target => "@timestamp"
      timezone => "UTC"
    }
  }
  
  # Add metadata for better searchability
  mutate {
    add_field => {
      "[@metadata][target_index]" => "ai-part-designer-%{+YYYY.MM.dd}"
    }
  }
  
  # Tag logs by component
  if [logger] {
    if [logger] =~ /^app\.api/ {
      mutate { add_tag => ["api_layer"] }
    } else if [logger] =~ /^app\.worker/ {
      mutate { add_tag => ["worker_layer"] }
    } else if [logger] =~ /^app\.ai/ {
      mutate { add_tag => ["ai_layer"] }
    } else if [logger] =~ /^app\.cad/ {
      mutate { add_tag => ["cad_layer"] }
    }
  }
  
  # Extract key business metrics
  if [design_id] {
    mutate {
      add_field => { "business_entity" => "design" }
      add_field => { "entity_id" => "%{design_id}" }
    }
  }
  
  if [user_id] and [request_id] {
    mutate { add_tag => ["traceable_request"] }
  }
}

output {
  elasticsearch {
    hosts => ["${ELASTICSEARCH_HOSTS}"]
    index => "%{[@metadata][target_index]}"
    id => "elasticsearch_sink"
  }
}
