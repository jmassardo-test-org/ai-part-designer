global:
  scrape_interval: 20s
  evaluation_interval: 25s
  external_labels:
    environment: development
    application: ai-part-designer
rule_files:
- /etc/prometheus/rules/*.yml
scrape_configs:
- job_name: part-designer-api
  scrape_interval: 15s
  scrape_timeout: 10s
  metrics_path: /metrics
  static_configs:
  - targets:
    - backend:8000
    labels:
      tier: backend
      component: api-server
  relabel_configs:
  - source_labels:
    - __address__
    target_label: instance
    replacement: api-backend
- job_name: async-job-workers
  scrape_interval: 30s
  scrape_timeout: 10s
  metrics_path: /metrics
  static_configs:
  - targets:
    - worker:9808
    labels:
      tier: background
      component: celery-worker
- job_name: prometheus-self
  scrape_interval: 30s
  scrape_timeout: 10s
  metrics_path: /metrics
  static_configs:
  - targets:
    - localhost:9090
    labels:
      tier: monitoring
      component: prometheus
