name: Lint & Type Check

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/lint.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint with Ruff
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "backend/pyproject.toml"

      - name: Install dependencies
        working-directory: backend
        run: uv sync --all-extras

      - name: Run Ruff linter
        working-directory: backend
        run: uv run ruff check app tests --output-format=github

      - name: Run Ruff formatter check
        working-directory: backend
        run: uv run ruff format app tests --check

  type-check:
    name: Type Check with MyPy
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 \
            libegl1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "backend/pyproject.toml"

      - name: Install dependencies
        working-directory: backend
        run: uv sync --all-extras

      - name: Run MyPy
        working-directory: backend
        run: uv run mypy app --show-error-codes

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "backend/pyproject.toml"

      - name: Install dependencies
        working-directory: backend
        run: uv sync --all-extras

      - name: Export requirements for pip-audit
        working-directory: backend
        run: uv pip compile pyproject.toml -o requirements.txt

      - name: Run Bandit security linter
        working-directory: backend
        continue-on-error: true
        run: uv run bandit -r app -ll -ii

      - name: Run pip-audit
        working-directory: backend
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt
