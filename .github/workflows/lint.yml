name: Lint & Type Check

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/lint.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint with Ruff
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Load cached venv
        id: cached-dependencies
        uses: actions/cache@v4
        with:
          path: backend/.venv
          key: venv-lint-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('backend/pyproject.toml') }}

      - name: Install dependencies
        if: steps.cached-dependencies.outputs.cache-hit != 'true'
        working-directory: backend
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -e .[dev]

      - name: Run Ruff linter
        working-directory: backend
        run: |
          source .venv/bin/activate
          ruff check app tests --output-format=github

      - name: Run Ruff formatter check
        working-directory: backend
        run: |
          source .venv/bin/activate
          ruff format app tests --check

  type-check:
    name: Type Check with MyPy
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-glx \
            libglu1-mesa

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Load cached venv
        id: cached-dependencies
        uses: actions/cache@v4
        with:
          path: backend/.venv
          key: venv-typecheck-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('backend/pyproject.toml') }}

      - name: Install dependencies
        if: steps.cached-dependencies.outputs.cache-hit != 'true'
        working-directory: backend
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -e .[dev]

      - name: Run MyPy
        working-directory: backend
        run: |
          source .venv/bin/activate
          mypy app --show-error-codes

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -e .[dev]

      - name: Export requirements for pip-audit
        working-directory: backend
        run: |
          source .venv/bin/activate
          pip freeze > requirements.txt

      - name: Run Bandit security linter
        working-directory: backend
        continue-on-error: true
        run: |
          source .venv/bin/activate
          bandit -r app -ll -ii

      - name: Run pip-audit
        working-directory: backend
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt
