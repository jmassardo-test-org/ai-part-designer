# Production environment overrides
backendImage: ghcr.io/jmassardo/ai-part-designer-backend:v0.1.0
frontendImage: ghcr.io/jmassardo/ai-part-designer-frontend:v0.1.0

# Full production resources (use defaults from values.yaml)
backendReplicas: 3
frontendReplicas: 2
workerReplicas: 3

# Production environment settings
deploymentEnvironment: "production"
debugEnabled: false
logLevel: "INFO"

# Enable ingress for production
ingressEnabled: true
ingressHost: "app.ai-part-designer.com"

# Production CORS
viteApiUrl: "https://app.ai-part-designer.com"

# Enable all infrastructure components
installPostgres: true
installRedis: true
installMinio: true
installIngress: true
installCerts: true

# Production storage configuration
# Use high-IOPS SSD storage class with data retention policy
persistentStorage:
  # Override with your cluster's high-performance StorageClass name
  # Examples: "premium-rwo" (GKE), "gp3-retain" (EKS), "managed-premium-retain" (AKS)
  # IMPORTANT: Use a StorageClass with reclaimPolicy: Retain for production
  storageClassName: "fast-ssd"
  expandable: true

# Full HA configuration with production storage sizes per US-2.6
cloudnative-pg:
  cluster:
    instances: 3
    storage:
      size: 100Gi
      storageClass: "fast-ssd"
    postgresql:
      parameters:
        max_connections: "200"
        shared_buffers: "256MB"
    monitoring:
      enabled: true
    # CloudNativePG handles backup integration to MinIO
    backup:
      enabled: true
      destinationPath: "s3://backups/postgresql"
      retentionPolicy: "30d"

# CloudNativePG PostgreSQL Configuration (Production)
cloudnativePg:
  cluster:
    instances: 3
    storage:
      size: 100Gi
      storageClass: "fast-ssd"
    postgresql:
      parameters:
        max_connections: "200"
        shared_buffers: "512MB"
        effective_cache_size: "2GB"
        maintenance_work_mem: "128MB"
    monitoring:
      enabled: true
    backup:
      enabled: true
      destinationPath: "s3://backups/postgresql"
      endpointURL: "http://minio:9000"
      schedule: "0 2 * * *"
      retentionPolicy: "30d"
    resources:
      requests:
        memory: "2Gi"
        cpu: "1000m"
      limits:
        memory: "4Gi"
        cpu: "2000m"
  pooler:
    enabled: true
    instances: 3
  superuserPassword: "CHANGEME_USE_SECRET_MANAGER"
  appUserPassword: "CHANGEME_USE_SECRET_MANAGER"

redis:
  # Full HA Redis with Sentinel for production
  architecture: replication
  auth:
    enabled: true
    password: "CHANGEME_USE_SECRET_MANAGER"
    sentinel: true
  sentinel:
    enabled: true
    quorum: 2
    downAfterMilliseconds: 5000
    failoverTimeout: 10000
    parallelSyncs: 1
  master:
    persistence:
      enabled: true
      size: 10Gi
      storageClass: "fast-ssd"
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "2Gi"
        cpu: "1000m"
  replica:
    replicaCount: 2  # 2 replicas for production HA (3 total pods with master)
    persistence:
      enabled: true
      size: 10Gi
      storageClass: "fast-ssd"
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "2Gi"
        cpu: "1000m"
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      interval: 30s
  # Redis RDB + AOF for maximum durability
  commonConfiguration: |-
    save 900 1
    save 300 10
    save 60 10000
    appendonly yes
    appendfsync everysec
    auto-aof-rewrite-percentage 100
    auto-aof-rewrite-min-size 64mb

minio:
  rootPassword: "CHANGEME_USE_SECRET_MANAGER"
  persistence:
    enabled: true
    size: 500Gi
    storageClass: "fast-ssd"
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

# OpenBao storage for production secrets vault
openbao:
  server:
    dataStorage:
      enabled: true
      size: 10Gi
      storageClass: "fast-ssd"
    auditStorage:
      enabled: true
      size: 5Gi
      storageClass: "fast-ssd"

# Enable network policies in production
networkPoliciesEnabled: true

# Enable external secrets for production
externalSecretsEnabled: true

# Production Ingress - Enable external access with full security
ingressEnabled: true
installIngress: true
installCerts: true

# Production TLS with Let's Encrypt
ingressCertIssuer: "letsencrypt-prod"
ingressHost: "app.ai-part-designer.com"
ingressMultiDomain: true
ingressFrontendHost: "app.ai-part-designer.com"
ingressBackendHost: "api.ai-part-designer.com"

# Strict rate limiting for production abuse protection
ingressRateLimitRps: "100"
ingressRateLimitConnections: "50"
ingressRateLimitBurst: "5"

# Production request handling for CAD file uploads
ingressMaxBodySize: "100m"
ingressClientBodyBufferSize: "10m"

# Extended timeouts for AI CAD generation operations
ingressProxyConnectTimeout: "300"
ingressProxySendTimeout: "300"
ingressProxyReadTimeout: "300"

# Production HSTS with preload
ingressHstsMaxAge: "31536000"
ingressHstsPreload: "true"

# NGINX Ingress for production traffic handling
ingress-nginx:
  controller:
    replicaCount: 2
    minAvailable: 1
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 512Mi
    config:
      proxy-buffer-size: "16k"
      large-client-header-buffers: "4 32k"
      enable-opentracing: "true"
      custom-http-errors: "404,503"
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
    service:
      type: LoadBalancer
    admissionWebhooks:
      enabled: true
      failurePolicy: Fail

# Certificate automation for production
cert-manager:
  installCRDs: true
  replicaCount: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  webhook:
    replicaCount: 1
  prometheus:
    enabled: true
    servicemonitor:
      enabled: true
