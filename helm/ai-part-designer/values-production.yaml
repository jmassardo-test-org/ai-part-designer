# Production environment overrides
backendImage: ghcr.io/jmassardo/ai-part-designer-backend:v0.1.0
frontendImage: ghcr.io/jmassardo/ai-part-designer-frontend:v0.1.0

# Full production resources (use defaults from values.yaml)
backendReplicas: 3
frontendReplicas: 2
workerReplicas: 3

# Production environment settings
deploymentEnvironment: "production"
debugEnabled: false
logLevel: "INFO"

# Enable ingress for production
ingressEnabled: true
ingressHost: "app.ai-part-designer.com"

# Production CORS
viteApiUrl: "https://app.ai-part-designer.com"

# Enable all infrastructure components
installPostgres: true
installRedis: true
installMinio: true
installIngress: true
installCerts: true

# Production storage configuration
# Use high-IOPS SSD storage class with data retention policy
persistentStorage:
  # Override with your cluster's high-performance StorageClass name
  # Examples: "premium-rwo" (GKE), "gp3-retain" (EKS), "managed-premium-retain" (AKS)
  # IMPORTANT: Use a StorageClass with reclaimPolicy: Retain for production
  storageClassName: "fast-ssd"
  expandable: true

# Full HA configuration with production storage sizes per US-2.6
cloudnative-pg:
  cluster:
    instances: 3
    storage:
      size: 100Gi
      storageClass: "fast-ssd"
    postgresql:
      parameters:
        max_connections: "200"
        shared_buffers: "256MB"
    monitoring:
      enabled: true
    # CloudNativePG handles backup integration to MinIO
    backup:
      enabled: true
      destinationPath: "s3://backups/postgresql"
      retentionPolicy: "30d"

redis:
  auth:
    password: "CHANGEME_USE_SECRET_MANAGER"
  master:
    persistence:
      enabled: true
      size: 10Gi
      storageClass: "fast-ssd"
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "1Gi"
        cpu: "500m"
  # Redis RDB snapshots for persistence
  commonConfiguration: |-
    save 900 1
    save 300 10
    save 60 10000

minio:
  rootPassword: "CHANGEME_USE_SECRET_MANAGER"
  persistence:
    enabled: true
    size: 500Gi
    storageClass: "fast-ssd"
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

# OpenBao storage for production secrets vault
openbao:
  server:
    dataStorage:
      enabled: true
      size: 10Gi
      storageClass: "fast-ssd"
    auditStorage:
      enabled: true
      size: 5Gi
      storageClass: "fast-ssd"

# Enable network policies in production
networkPoliciesEnabled: true

# Enable external secrets for production
externalSecretsEnabled: true
