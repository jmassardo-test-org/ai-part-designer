{{- if .Values.installPostgres }}
apiVersion: v1
kind: Secret
metadata:
  name: postgres-superuser
  labels:
    {{- include "ai-part-designer.labels" . | nindent 4 }}
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
type: kubernetes.io/basic-auth
stringData:
  username: {{ .Values.postgresUser | default "postgres" }}
  password: {{ .Values.cloudnativePg.superuserPassword | default "CHANGEME_USE_SECRET_MANAGER" | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-app-user
  labels:
    {{- include "ai-part-designer.labels" . | nindent 4 }}
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
type: kubernetes.io/basic-auth
stringData:
  username: {{ .Values.postgresUser | default "app" }}
  password: {{ .Values.cloudnativePg.appUserPassword | default "CHANGEME_USE_SECRET_MANAGER" | quote }}
{{- end }}
