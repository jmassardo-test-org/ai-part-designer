{{- if and .Values.installRedis .Values.networkPoliciesEnabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-network-policy
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: redis
    {{- include "ai-part-designer.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: redis
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow traffic from backend
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: backend
          app.kubernetes.io/instance: {{ .Release.Name }}
    ports:
    - protocol: TCP
      port: 6379
  # Allow traffic from celery worker
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: celery-worker
          app.kubernetes.io/instance: {{ .Release.Name }}
    ports:
    - protocol: TCP
      port: 6379
  # Allow traffic from celery beat
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: celery-beat
          app.kubernetes.io/instance: {{ .Release.Name }}
    ports:
    - protocol: TCP
      port: 6379
  # Allow Sentinel traffic between Redis pods
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: redis
          app.kubernetes.io/instance: {{ .Release.Name }}
    ports:
    - protocol: TCP
      port: 26379
    - protocol: TCP
      port: 6379
  # Allow Prometheus metrics scraping
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 9121
  egress:
  # Allow DNS resolution
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: UDP
      port: 53
  # Allow Redis replication and Sentinel communication
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: redis
          app.kubernetes.io/instance: {{ .Release.Name }}
    ports:
    - protocol: TCP
      port: 6379
    - protocol: TCP
      port: 26379
{{- end }}
