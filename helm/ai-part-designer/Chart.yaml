apiVersion: v2
name: ai-part-designer
description: AssemblematicAI 3D part designer with AI-powered CAD generation
type: application
version: 0.1.0
appVersion: "0.1.0"
dependencies:
  - name: cloudnative-pg
    version: "0.22.1"
    repository: "https://cloudnative-pg.github.io/charts"
    condition: installPostgres
  - name: redis
    version: "18.19.4"
    repository: "https://charts.bitnami.com/bitnami"
    condition: installRedis
  - name: minio
    version: "5.2.0"
    repository: "https://charts.min.io/"
    condition: installMinio
  - name: openbao
    version: "0.4.0"
    repository: "https://openbao.github.io/openbao-helm"
    condition: installVault
  - name: ingress-nginx
    version: "4.11.3"
    repository: "https://kubernetes.github.io/ingress-nginx"
    condition: installIngress
  - name: cert-manager
    version: "1.16.2"
    repository: "https://charts.jetstack.io"
    condition: installCerts
