# Staging environment overrides
backendImage: ghcr.io/jmassardo/ai-part-designer-backend:staging
frontendImage: ghcr.io/jmassardo/ai-part-designer-frontend:staging

# Moderate resources for staging
backendReplicas: 2
frontendReplicas: 2
workerReplicas: 2

# Staging environment settings
deploymentEnvironment: "staging"
debugEnabled: false
logLevel: "INFO"

# Enable ingress for staging
ingressEnabled: true
ingressHost: "staging.ai-part-designer.example.com"

# Staging-specific CORS
viteApiUrl: "https://staging.ai-part-designer.example.com"

# Staging storage configuration
# Use standard SSD storage class for staging
persistentStorage:
  # Override with your cluster's standard SSD StorageClass name
  # Examples: "standard-ssd" (GKE), "gp3" (EKS), "managed-premium" (AKS)
  storageClassName: "standard"
  expandable: true

# Moderate storage per US-2.6 requirements
cloudnative-pg:
  cluster:
    instances: 2
    storage:
      size: 15Gi
      storageClass: "standard"

# CloudNativePG PostgreSQL Configuration (Staging)
cloudnativePg:
  cluster:
    instances: 2
    storage:
      size: 50Gi
      storageClass: "standard"
    backup:
      enabled: true
      endpointURL: "http://minio:9000"
      schedule: "0 3 * * *"
      retentionPolicy: "7d"
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "2Gi"
        cpu: "1000m"
  pooler:
    enabled: true
    instances: 2

redis:
  # Redis with Sentinel for HA in staging
  architecture: replication
  auth:
    enabled: true
    password: "CHANGEME_USE_SECRET_MANAGER"
    sentinel: true
  sentinel:
    enabled: true
    quorum: 2
    downAfterMilliseconds: 5000
    failoverTimeout: 10000
    parallelSyncs: 1
  master:
    persistence:
      enabled: true
      size: 4Gi
      storageClass: "standard"
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
  replica:
    replicaCount: 1  # 1 replica for staging (2 total pods with master)
    persistence:
      enabled: true
      size: 4Gi
      storageClass: "standard"
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      interval: 30s
  commonConfiguration: |-
    save 900 1
    save 300 10
    save 60 10000
    appendonly yes
    appendfsync everysec

minio:
  persistence:
    enabled: true
    size: 25Gi
    storageClass: "standard"

# Ingress configuration for staging
ingressEnabled: true
installIngress: true
installCerts: true

# Use Let's Encrypt staging for testing
ingressCertIssuer: "letsencrypt-staging"
ingressHost: "staging.ai-part-designer.example.com"
ingressMultiDomain: false

# Moderate rate limiting for staging
ingressRateLimitRps: "200"
ingressRateLimitConnections: "100"

# Staging-specific ingress settings
ingressMaxBodySize: "100m"
ingressProxyReadTimeout: "300"

# ingress-nginx staging config
ingress-nginx:
  controller:
    replicaCount: 2
    resources:
      requests:
        cpu: 150m
        memory: 192Mi
      limits:
        cpu: 750m
        memory: 384Mi
    service:
      type: LoadBalancer
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true

# cert-manager staging config
cert-manager:
  installCRDs: true
  replicaCount: 1
  resources:
    requests:
      cpu: 40m
      memory: 96Mi
    limits:
      cpu: 150m
      memory: 192Mi
  prometheus:
    enabled: true
    servicemonitor:
      enabled: true
