# Converted from k8s/base manifests - application-specific configuration

backendImage: ghcr.io/jmassardo/ai-part-designer-backend:latest
frontendImage: ghcr.io/jmassardo/ai-part-designer-frontend:latest

# From k8s/base/backend/deployment.yaml
backendReplicas: 3
backendMemRequest: "512Mi"
backendCpuRequest: "250m"
backendMemLimit: "2Gi"
backendCpuLimit: "1000m"

# From k8s/base/frontend/deployment.yaml
frontendReplicas: 2
frontendMemRequest: "64Mi"
frontendCpuRequest: "50m"
frontendMemLimit: "256Mi"
frontendCpuLimit: "200m"

# From k8s/base/celery/worker-deployment.yaml
workerReplicas: 3
workerConcurrency: 4
workerMemRequest: "1Gi"
workerCpuRequest: "500m"
workerMemLimit: "4Gi"
workerCpuLimit: "2000m"

# From k8s/base/celery/beat-deployment.yaml
beatReplicas: 1
beatMemRequest: "128Mi"
beatCpuRequest: "50m"
beatMemLimit: "512Mi"
beatCpuLimit: "200m"

# From k8s/base/backend/hpa.yaml
backendHpaMin: 3
backendHpaMax: 10
backendCpuPercent: 70
backendMemPercent: 80

# From k8s/base/celery/worker-hpa.yaml
workerHpaMin: 3
workerHpaMax: 10
workerCpuPercent: 70
workerMemPercent: 80

# From k8s/base/backend/configmap.yaml - Application Settings
assemblematicAppName: "AssemblematicAI"
assemblematicVersion: "0.1.0"
assemblematicApiPrefix: "/api/v1"

# Database settings from configmap
postgresHost: "postgres-service"
postgresPort: "5432"
postgresDb: "assemblematic_ai"

# Redis settings from configmap
# For Sentinel mode, this is the master service name
redisHost: "ai-part-designer-redis-master"
redisPort: "6379"
redisDb: "0"
redisSentinelEnabled: "true"
redisSentinelService: "ai-part-designer-redis"
redisSentinelPort: "26379"
redisMasterSet: "mymaster"

# MinIO storage from configmap
storageBackend: "minio"
minioEndpoint: "http://minio:9000"
awsRegion: "us-east-1"
designsBucket: "designs"
exportsBucket: "exports"
thumbnailsBucket: "thumbnails"
uploadsBucket: "uploads"
tempBucket: "temp"

# AI Provider configuration from configmap
aiProvider: "anthropic"
anthropicModel: "claude-sonnet-4-20250514"
aiMaxTokens: "4096"
aiTemperature: "0.3"

# Security settings from configmap
accessTokenMinutes: "15"
refreshTokenDays: "7"
jwtAlgorithm: "HS256"
passwordMinLength: "8"
maxLoginAttempts: "5"
lockoutMinutes: "15"
requireEmailVerification: "true"
sessionTimeoutMinutes: "60"
concurrentSessionLimit: "5"
corsAllowCredentials: "true"

# Rate limiting from configmap
rateLimitEnabled: "true"
rateLimitPerMinute: "60"
rateLimitPerHour: "1000"

# Job processing settings from configmap
cadWorkerTimeout: "300"
maxConcurrentJobs: "10"
jobRetryDelay: "60"

# File upload from configmap
maxUploadSizeMB: "50"

# CAD v2 features from configmap
cadV2Enabled: "true"
cadV2AsDefault: "true"

# Logging from configmap
logLevel: "INFO"

# Environment overrides
deploymentEnvironment: "production"
debugEnabled: false

# Frontend config from k8s/base/frontend/configmap.yaml
viteApiUrl: "http://backend:8000"
viteWsUrl: "ws://backend:8000"

# Ingress settings
ingressEnabled: false
ingressHost: "app.example.com"
ingressTlsSecret: "ai-part-designer-tls"
ingressCertIssuer: "letsencrypt-prod"

# Ingress routing mode
# Set to true for multi-domain (app.example.com + api.example.com)
# Set to false for single domain with path-based routing
ingressMultiDomain: false
ingressFrontendHost: "app.example.com"
ingressBackendHost: "api.example.com"

# Ingress rate limiting
ingressRateLimitRps: "100"
ingressRateLimitConnections: "50"
ingressRateLimitBurst: "5"

# Ingress request size limits (for file uploads)
ingressMaxBodySize: "100m"
ingressClientBodyBufferSize: "10m"

# Ingress timeout settings (for long-running CAD generation)
ingressProxyConnectTimeout: "300"
ingressProxySendTimeout: "300"
ingressProxyReadTimeout: "300"

# HSTS settings
ingressHstsMaxAge: "31536000"
ingressHstsPreload: "true"

# Security headers
ingressSecurityHeaders:
  xFrameOptions: "DENY"

# Additional ingress annotations (optional)
ingressAdditionalAnnotations: {}

# Network policies
networkPoliciesEnabled: true

# External secrets
externalSecretsEnabled: false

# Service accounts
createServiceAccounts: true

# Dependency toggles
installPostgres: true
installRedis: true
installMinio: true
installVault: false
installIngress: false
installCerts: false

# Storage configuration - specify StorageClass for each environment
# Set to empty string "" to use cluster default
persistentStorage:
  storageClassName: ""  # Override in environment-specific values files
  expandable: true      # Enable volume expansion across all PVCs

# Subchart configs
cloudnative-pg:
  cluster:
    instances: 3
    storage:
      size: 100Gi  # Production default per US-2.6 requirements
      storageClass: ""  # Uses persistentStorage.storageClassName if not overridden

# CloudNativePG PostgreSQL Configuration
cloudnativePg:
  cluster:
    instances: 3
    storage:
      size: 100Gi
      storageClass: ""
    postgresql:
      parameters:
        max_connections: "200"
        shared_buffers: "256MB"
        effective_cache_size: "1GB"
        maintenance_work_mem: "64MB"
        checkpoint_completion_target: "0.9"
        wal_buffers: "16MB"
        default_statistics_target: "100"
        random_page_cost: "1.1"
        effective_io_concurrency: "200"
        work_mem: "4MB"
        huge_pages: "off"
        min_wal_size: "1GB"
        max_wal_size: "4GB"
        max_worker_processes: "8"
        max_parallel_workers_per_gather: "4"
        max_parallel_workers: "8"
        max_parallel_maintenance_workers: "4"
    monitoring:
      enabled: true
    backup:
      enabled: true
      destinationPath: "s3://backups/postgresql"
      endpointURL: "http://minio:9000"
      schedule: "0 2 * * *"
      retentionPolicy: "30d"
      immediate: false
      suspend: false
      s3:
        accessKeyId: "minio"
        secretAccessKey: "CHANGEME"
    resources:
      requests:
        memory: "1Gi"
        cpu: "500m"
      limits:
        memory: "2Gi"
        cpu: "2000m"
  pooler:
    enabled: true
    instances: 2
    type: "rw"
    pgbouncer:
      poolMode: "session"
      parameters:
        max_client_conn: "1000"
        default_pool_size: "25"
        max_db_connections: "100"
        max_user_connections: "100"
        reserve_pool_size: "5"
        reserve_pool_timeout: "5"
        log_connections: "0"
        log_disconnections: "0"
        server_idle_timeout: "600"
        server_lifetime: "3600"
        server_connect_timeout: "15"
        query_timeout: "0"
        stats_period: "60"
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
  superuserPassword: "CHANGEME"
  appUserPassword: "CHANGEME"

# PostgreSQL connection settings (for application)
postgresUser: "app"

redis:
  # Redis configuration with Sentinel for HA per US-2.8
  architecture: replication  # Enables Sentinel mode
  auth:
    enabled: true
    password: "CHANGEME"
    sentinel: true
  sentinel:
    enabled: true
    quorum: 2
    downAfterMilliseconds: 5000
    failoverTimeout: 10000
    parallelSyncs: 1
  master:
    persistence:
      enabled: true
      size: 10Gi  # Production default per US-2.6 requirements
      storageClass: ""  # Uses persistentStorage.storageClassName if not overridden
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
  replica:
    replicaCount: 2  # 2 replicas for HA (3 total pods with master)
    persistence:
      enabled: true
      size: 10Gi
      storageClass: ""
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      namespace: ""
      interval: 30s
  # Redis persistence configuration (RDB + AOF)
  commonConfiguration: |-
    # RDB snapshots
    save 900 1
    save 300 10
    save 60 10000
    # AOF persistence
    appendonly yes
    appendfsync everysec

minio:
  rootPassword: "CHANGEME"
  persistence:
    enabled: true
    size: 500Gi  # Production default per US-2.6 requirements
    storageClass: ""  # Uses persistentStorage.storageClassName if not overridden
  buckets:
    - name: designs
    - name: exports
    - name: thumbnails
    - name: uploads
    - name: temp

# OpenBao storage (when enabled via installVault: true)
openbao:
  server:
    dataStorage:
      enabled: true
      size: 10Gi
      storageClass: ""  # Uses persistentStorage.storageClassName if not overridden
    auditStorage:
      enabled: true
      size: 5Gi
      storageClass: ""  # Uses persistentStorage.storageClassName if not overridden

# NGINX Ingress Controller configuration
ingress-nginx:
  controller:
    replicaCount: 2
    minAvailable: 1
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 512Mi
    config:
      # Custom buffer sizes for CAD file processing
      proxy-buffer-size: "16k"
      large-client-header-buffers: "4 32k"
      # Enable real-time metrics
      enable-opentracing: "true"
      # Custom error pages
      custom-http-errors: "404,503"
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
    service:
      type: LoadBalancer
      annotations: {}
    admissionWebhooks:
      enabled: true
      failurePolicy: Fail

# cert-manager configuration
cert-manager:
  installCRDs: true
  replicaCount: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  webhook:
    replicaCount: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
  cainjector:
    replicaCount: 1
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
  prometheus:
    enabled: true
    servicemonitor:
      enabled: true
