# Development environment overrides
backendImage: ghcr.io/jmassardo/ai-part-designer-backend:dev
frontendImage: ghcr.io/jmassardo/ai-part-designer-frontend:dev

# Reduced resources for dev
backendReplicas: 1
backendHpaMin: 1
backendHpaMax: 2
backendMemRequest: "256Mi"
backendCpuRequest: "100m"

frontendReplicas: 1

workerReplicas: 1
workerHpaMin: 1
workerHpaMax: 2
workerMemRequest: "512Mi"
workerCpuRequest: "250m"

# Dev environment settings
deploymentEnvironment: "development"
debugEnabled: true
logLevel: "DEBUG"

# Local service names
postgresHost: "postgres-service.ai-part-designer-dev.svc.cluster.local"
redisHost: "ai-part-designer-redis-master.ai-part-designer-dev.svc.cluster.local"

# Disable autoscaling in dev
backendHpaMin: 1
backendHpaMax: 1
workerHpaMin: 1
workerHpaMax: 1

# Development storage configuration
# Use local-path or cluster default for dev environments
persistentStorage:
  storageClassName: ""  # Uses cluster default (e.g., local-path, standard)
  expandable: true

# Smaller storage for dev per US-2.6 requirements
cloudnative-pg:
  cluster:
    instances: 1
    storage:
      size: 10Gi
      storageClass: ""

# CloudNativePG PostgreSQL Configuration (Dev)
cloudnativePg:
  cluster:
    instances: 1
    storage:
      size: 10Gi
      storageClass: ""
    backup:
      enabled: false
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "1Gi"
        cpu: "500m"
  pooler:
    enabled: false

redis:
  # Reduced Redis for dev (single instance, no Sentinel)
  architecture: standalone
  auth:
    enabled: true
    password: "dev-redis-password"
    sentinel: false
  sentinel:
    enabled: false
  master:
    persistence:
      enabled: true
      size: 2Gi
      storageClass: ""
    resources:
      requests:
        memory: "128Mi"
        cpu: "50m"
      limits:
        memory: "256Mi"
        cpu: "200m"
  metrics:
    enabled: false

minio:
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""

# Ingress configuration for dev (disabled by default, use port-forward)
ingressEnabled: false
installIngress: false
installCerts: false

# If ingress is needed for dev, use self-signed certs
ingressCertIssuer: "selfsigned"
ingressHost: "dev.ai-part-designer.local"
ingressMultiDomain: false

# Relaxed rate limiting for dev
ingressRateLimitRps: "500"
ingressRateLimitConnections: "200"

# ingress-nginx dev config (if enabled)
ingress-nginx:
  controller:
    replicaCount: 1
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

# cert-manager dev config (if enabled)
cert-manager:
  installCRDs: true
  replicaCount: 1
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
