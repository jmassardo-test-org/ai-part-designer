---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  template:
    spec:
      containers:
      - name: frontend
        # Use K8s service endpoint for dev (within cluster)
        env:
        - name: VITE_API_URL
          value: "http://backend-dev:8000/api/v1"
        - name: VITE_WS_URL
          value: "ws://backend-dev:8000/ws"
        resources:
          requests:
            memory: "32Mi"
            cpu: "25m"
          limits:
            memory: "128Mi"
            cpu: "100m"
      $patch: replace
