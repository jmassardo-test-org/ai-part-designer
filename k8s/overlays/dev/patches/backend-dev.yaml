---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  template:
    spec:
      containers:
      - name: backend
        env:
        - name: ENVIRONMENT
          value: "development"
        - name: DEBUG
          value: "true"
        # Override hostnames for dev environment
        - name: POSTGRES_HOST
          value: "postgres-cluster-dev-rw"
        - name: REDIS_HOST
          value: "redis-master"
        - name: CORS_ORIGINS
          value: '["http://localhost:5173","http://localhost:3000","https://dev.assemblematic.ai"]'
        - name: FRONTEND_URL
          value: "https://dev.assemblematic.ai"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "500m"
