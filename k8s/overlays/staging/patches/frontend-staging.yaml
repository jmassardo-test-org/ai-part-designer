---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 2
  template:
    spec:
      containers:
      - name: frontend
        env:
        - name: VITE_API_URL
          value: "https://api-staging.assemblematic.ai/api/v1"
          valueFrom: null
        - name: VITE_WS_URL
          value: "wss://api-staging.assemblematic.ai/ws"
          valueFrom: null
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
