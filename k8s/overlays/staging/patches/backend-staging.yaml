---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2
  template:
    spec:
      containers:
      - name: backend
        env:
        - name: ENVIRONMENT
          value: "staging"
        - name: DEBUG
          value: "false"
        - name: CORS_ORIGINS
          value: '["https://staging.assemblematic.ai"]'
        - name: FRONTEND_URL
          value: "https://staging.assemblematic.ai"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
