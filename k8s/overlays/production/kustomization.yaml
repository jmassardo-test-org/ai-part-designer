---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ai-part-designer-prod

# Base configuration
resources:
- ../../base

# Add environment-specific suffix
nameSuffix: -prod

# Environment-specific labels
labels:
- pairs:
    environment: production

# Patches for production environment
patches:
- path: patches/backend-prod.yaml
  target:
    kind: Deployment
    name: backend
- path: patches/frontend-prod.yaml
  target:
    kind: Deployment
    name: frontend
- path: patches/celery-worker-prod.yaml
  target:
    kind: Deployment
    name: celery-worker
- path: patches/celery-beat-prod.yaml
  target:
    kind: Deployment
    name: celery-beat

# ConfigMap generator for environment-specific config
configMapGenerator:
- name: backend-config-prod
  literals:
  - ENVIRONMENT=production
  - DEBUG=false
  - LOG_LEVEL=INFO
  - POSTGRES_HOST=postgres-service.infrastructure.svc.cluster.local
  - REDIS_HOST=redis-service.infrastructure.svc.cluster.local
  - REQUIRE_EMAIL_VERIFICATION=true
  - FORCE_HTTPS=true

# IMPORTANT: Secrets MUST be managed outside of version control
# Required secrets for production:
#   - postgres-user: PostgreSQL username
#   - postgres-password: PostgreSQL password
#   - anthropic-api-key: Anthropic Claude API key
#   - secret-key: JWT signing secret (generate with: openssl rand -hex 32)
#   - s3-endpoint-url: S3 endpoint URL
#   - aws-access-key-id: AWS/S3 access key
#   - aws-secret-access-key: AWS/S3 secret key
#
# Recommended approaches:
# 1. Sealed Secrets: https://github.com/bitnami-labs/sealed-secrets
# 2. External Secrets Operator: https://external-secrets.io/
# 3. HashiCorp Vault: https://www.vaultproject.io/
# 4. AWS Secrets Manager / GCP Secret Manager / Azure Key Vault
#
# Example using sealed-secrets:
#   kubectl create secret generic backend-secrets \
#     --namespace=ai-part-designer-prod \
#     --dry-run=client -o yaml \
#     --from-literal=postgres-user=<YOUR_DB_USER> \
#     --from-literal=postgres-password=<YOUR_DB_PASSWORD> \
#     --from-literal=anthropic-api-key=<YOUR_API_KEY> \
#     --from-literal=secret-key=<YOUR_SECRET_KEY> \
#     --from-literal=s3-endpoint-url=<YOUR_S3_ENDPOINT> \
#     --from-literal=aws-access-key-id=<YOUR_ACCESS_KEY> \
#     --from-literal=aws-secret-access-key=<YOUR_SECRET_KEY> | \
#   kubeseal -o yaml > sealed-backend-secrets.yaml
#
# Then add to resources above:
# resources:
# - ../../base
# - sealed-backend-secrets.yaml

# Images with production tags (use specific version tags, not 'latest')
images:
- name: ai-part-designer-backend
  newName: ghcr.io/jmassardo/ai-part-designer-backend
  newTag: v1.0.0
- name: ai-part-designer-frontend
  newName: ghcr.io/jmassardo/ai-part-designer-frontend
  newTag: v1.0.0
