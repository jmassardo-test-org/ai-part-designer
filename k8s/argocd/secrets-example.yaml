---
# ArgoCD Secrets Configuration Template
# This file contains examples of secrets needed for ArgoCD
# DO NOT commit actual secrets to version control!

# GitHub Webhook Secret
# Create with: kubectl create secret generic argocd-github-webhook-secret -n argocd --from-literal=secret=YOUR_WEBHOOK_SECRET
apiVersion: v1
kind: Secret
metadata:
  name: argocd-github-webhook-secret
  namespace: argocd
type: Opaque
stringData:
  secret: "REPLACE_WITH_ACTUAL_WEBHOOK_SECRET"

---
# ArgoCD Notifications Secret
# Configure notification services (Slack, email, etc.)
apiVersion: v1
kind: Secret
metadata:
  name: argocd-notifications-secret
  namespace: argocd
type: Opaque
stringData:
  # Slack webhook URL
  slack-token: "REPLACE_WITH_SLACK_BOT_TOKEN"

  # Example for webhook notification
  # webhook-url: "https://your-webhook-endpoint.com/notify"

---
# Instructions for creating secrets:
#
# 1. GitHub Webhook Secret:
#    kubectl create secret generic argocd-github-webhook-secret \
#      -n argocd \
#      --from-literal=secret=$(openssl rand -hex 32)
#
# 2. Slack Notifications:
#    # Get Slack bot token from https://api.slack.com/apps
#    kubectl create secret generic argocd-notifications-secret \
#      -n argocd \
#      --from-literal=slack-token=xoxb-your-slack-bot-token
#
# 3. For production, use sealed-secrets or external-secrets-operator:
#    # Example with sealed-secrets:
#    kubectl create secret generic argocd-notifications-secret \
#      -n argocd \
#      --dry-run=client -o yaml \
#      --from-literal=slack-token=xoxb-your-token | \
#    kubeseal -o yaml > argocd-notifications-sealed-secret.yaml
