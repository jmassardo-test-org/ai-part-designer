---
# ArgoCD Installation
# This manifest installs ArgoCD using the official stable release
# For updates, see: https://github.com/argoproj/argo-cd/releases

apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-install-info
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd
data:
  version: "v2.10.0"
  install-method: "manifest"
  install-url: "https://raw.githubusercontent.com/argoproj/argo-cd/v2.10.0/manifests/install.yaml"

---
# Installation instructions:
# 1. Create namespace:
#    kubectl create namespace argocd
#
# 2. Install ArgoCD:
#    kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/v2.10.0/manifests/install.yaml
#
# 3. Apply custom configurations (this file):
#    kubectl apply -f k8s/argocd/
#
# 4. Get initial admin password:
#    kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}" | base64 -d
#
# 5. Port forward to access UI:
#    kubectl port-forward svc/argocd-server -n argocd 8080:443
#
# 6. Login with admin/<password> at https://localhost:8080

---
# ArgoCD ConfigMap for custom settings
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  # Repository configuration
  repositories: |
    - url: https://github.com/jmassardo/ai-part-designer
      name: ai-part-designer
      type: git

  # Resource customizations for health checks and schema compatibility
  resource.customizations: |
    networking.k8s.io/Ingress:
      health.lua: |
        hs = {}
        hs.status = "Healthy"
        return hs
    batch/Job:
      ignoreDifferences: |
        jsonPointers:
        - /spec/podReplacementPolicy
        - /status/terminating
    batch/CronJob:
      ignoreDifferences: |
        jsonPointers:
        - /spec/jobTemplate/spec/podReplacementPolicy

  # Webhook configuration for GitHub
  webhook.github.secret: github-webhook-secret

---
# ArgoCD RBAC ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-rbac-cm
    app.kubernetes.io/part-of: argocd
data:
  # Default policy for read-only access
  policy.default: role:readonly

  # RBAC policies
  policy.csv: |
    # Admin role - full access
    p, role:admin, applications, *, */*, allow
    p, role:admin, clusters, *, *, allow
    p, role:admin, repositories, *, *, allow
    p, role:admin, logs, get, *, allow
    p, role:admin, exec, create, */*, allow

    # Developer role - can sync applications
    p, role:developer, applications, get, */*, allow
    p, role:developer, applications, sync, */*, allow
    p, role:developer, applications, override, */*, allow
    p, role:developer, logs, get, */*, allow
    p, role:developer, exec, create, */*, allow

    # Read-only role
    p, role:readonly, applications, get, */*, allow
    p, role:readonly, logs, get, */*, allow
    p, role:readonly, projects, get, *, allow

    # Production sync requires admin role
    p, role:admin, applications, sync, ai-part-designer-prod/*, allow

    # Staging can be synced by developers
    p, role:developer, applications, sync, ai-part-designer-staging/*, allow

    # Grant admin role to default admin user
    g, admin, role:admin

---
# ArgoCD Notifications ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-notifications-cm
    app.kubernetes.io/part-of: argocd
data:
  # Notification templates
  template.app-deployed: |
    message: |
      Application {{.app.metadata.name}} has been deployed to {{.app.spec.destination.namespace}}.
      Sync Status: {{.app.status.sync.status}}
      Health Status: {{.app.status.health.status}}
      Revision: {{.app.status.sync.revision}}

  template.app-health-degraded: |
    message: |
      Application {{.app.metadata.name}} health status changed to {{.app.status.health.status}}.
      Application details: {{.context.argocdUrl}}/applications/{{.app.metadata.name}}.

  template.app-sync-failed: |
    message: |
      Application {{.app.metadata.name}} sync failed!
      Error: {{.app.status.operationState.message}}
      Application details: {{.context.argocdUrl}}/applications/{{.app.metadata.name}}.

  template.app-sync-succeeded: |
    message: |
      Application {{.app.metadata.name}} sync succeeded!
      Sync Status: {{.app.status.sync.status}}
      Health Status: {{.app.status.health.status}}
      Application details: {{.context.argocdUrl}}/applications/{{.app.metadata.name}}.

  # Notification triggers
  trigger.on-deployed: |
    - when: app.status.operationState.phase in ['Succeeded']
      send: [app-deployed]

  trigger.on-health-degraded: |
    - when: app.status.health.status == 'Degraded'
      send: [app-health-degraded]

  trigger.on-sync-failed: |
    - when: app.status.operationState.phase in ['Error', 'Failed']
      send: [app-sync-failed]

  trigger.on-sync-succeeded: |
    - when: app.status.operationState.phase in ['Succeeded'] && app.status.operationState.operation.sync != null
      send: [app-sync-succeeded]

  # Service configuration will be in argocd-notifications-secret
  # Example for Slack:
  # service.slack: |
  #   token: $slack-token

  # Subscriptions (which apps trigger which notifications)
  subscriptions: |
    # Notify on all staging deployments
    - recipients:
      - slack:deployments
      triggers:
      - on-sync-succeeded
      - on-sync-failed
      selector: environment=staging

    # Notify on all production deployments
    - recipients:
      - slack:deployments
      - slack:production-alerts
      triggers:
      - on-sync-succeeded
      - on-sync-failed
      - on-health-degraded
      selector: environment=production
