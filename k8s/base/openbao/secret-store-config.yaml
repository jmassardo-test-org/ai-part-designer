---
# ClusterSecretStore for External Secrets Operator
# This connects ESO to OpenBao for secret synchronization
#
# Prerequisites:
# - External Secrets Operator must be installed
# - OpenBao must be initialized and unsealed
# - Service accounts must exist in ai-part-designer namespace

apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: openbao-ai-part-designer
spec:
  provider:
    vault:
      server: "http://openbao.openbao.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      
      # Use Kubernetes authentication
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "ai-part-designer-api"  # Default role, can be overridden per ExternalSecret
          
          # Service account token for authentication
          serviceAccountRef:
            name: "api-service"

---
# SecretStore for API service (namespace-scoped)
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: openbao-api
  namespace: ai-part-designer
spec:
  provider:
    vault:
      server: "http://openbao.openbao.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "ai-part-designer-api"
          serviceAccountRef:
            name: "api-service"

---
# SecretStore for Worker service (namespace-scoped)
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: openbao-worker
  namespace: ai-part-designer
spec:
  provider:
    vault:
      server: "http://openbao.openbao.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "ai-part-designer-worker"
          serviceAccountRef:
            name: "worker-service"
