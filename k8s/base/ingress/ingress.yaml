---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-part-designer
  namespace: ai-part-designer
  annotations:
    # cert-manager configuration
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    
    # SSL/TLS configuration
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    
    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Permissions-Policy: geolocation=(), microphone=(), camera=()";
    
    # HSTS (HTTP Strict Transport Security)
    nginx.ingress.kubernetes.io/hsts: "true"
    nginx.ingress.kubernetes.io/hsts-max-age: "31536000"
    nginx.ingress.kubernetes.io/hsts-include-subdomains: "true"
    nginx.ingress.kubernetes.io/hsts-preload: "true"
    
    # Rate limiting - protects against abuse
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "50"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
    
    # Request size limits - accommodates file uploads (CAD files, STL exports)
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/client-body-buffer-size: "10m"
    
    # Timeout settings for long-running CAD generation
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    
    # CORS will be handled by the backend FastAPI application
    # But we enable proxy headers for proper CORS support
    nginx.ingress.kubernetes.io/enable-cors: "false"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    
    # WebSocket support for real-time updates
    nginx.ingress.kubernetes.io/websocket-services: "backend"
    
    # Backend protocol
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    
    # Health check endpoints
    nginx.ingress.kubernetes.io/health-check-path: "/api/v1/health"
    nginx.ingress.kubernetes.io/health-check-interval: "30s"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - app.assemblematic.ai
    - api.assemblematic.ai
    secretName: ai-part-designer-tls
  rules:
  # Frontend application
  - host: app.assemblematic.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
  # Backend API
  - host: api.assemblematic.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 8000
