---
# Logstash ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-config
  namespace: observability
  labels:
    app.kubernetes.io/name: logstash
    app.kubernetes.io/component: logging
data:
  logstash.conf: |
    input {
      tcp {
        port => 5044
        codec => json_lines
        id => "tcp_json_input"
      }
    }

    filter {
      if [timestamp] {
        date {
          match => ["timestamp", "ISO8601", "yyyy-MM-dd'T'HH:mm:ss.SSSSSSZ"]
          target => "@timestamp"
          timezone => "UTC"
        }
      }

      mutate {
        add_field => {
          "[@metadata][target_index]" => "ai-part-designer-%{+YYYY.MM.dd}"
        }
      }

      if [logger] {
        if [logger] =~ /^app\.api/ {
          mutate { add_tag => ["api_layer"] }
        } else if [logger] =~ /^app\.worker/ {
          mutate { add_tag => ["worker_layer"] }
        } else if [logger] =~ /^app\.ai/ {
          mutate { add_tag => ["ai_layer"] }
        } else if [logger] =~ /^app\.cad/ {
          mutate { add_tag => ["cad_layer"] }
        }
      }

      if [design_id] {
        mutate {
          add_field => { "business_entity" => "design" }
          add_field => { "entity_id" => "%{design_id}" }
        }
      }

      if [user_id] and [request_id] {
        mutate { add_tag => ["traceable_request"] }
      }
    }

    output {
      elasticsearch {
        hosts => ["http://elasticsearch.observability.svc.cluster.local:9200"]
        index => "%{[@metadata][target_index]}"
        id => "elasticsearch_sink"
      }
    }
---
# Logstash Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logstash
  namespace: observability
  labels:
    app.kubernetes.io/name: logstash
    app.kubernetes.io/component: logging
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: logstash
  template:
    metadata:
      labels:
        app.kubernetes.io/name: logstash
        app.kubernetes.io/component: logging
    spec:
      containers:
        - name: logstash
          image: docker.elastic.co/logstash/logstash:8.11.0
          env:
            - name: LS_JAVA_OPTS
              value: "-Xmx256m -Xms256m"
            - name: ELASTICSEARCH_HOSTS
              value: "http://elasticsearch.observability.svc.cluster.local:9200"
          ports:
            - containerPort: 5044
              name: tcp-input
            - containerPort: 9600
              name: monitoring
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /usr/share/logstash/pipeline/logstash.conf
              subPath: logstash.conf
          livenessProbe:
            httpGet:
              path: /
              port: monitoring
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: monitoring
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: logstash-config
---
# Logstash Service
apiVersion: v1
kind: Service
metadata:
  name: logstash
  namespace: observability
  labels:
    app.kubernetes.io/name: logstash
    app.kubernetes.io/component: logging
spec:
  type: ClusterIP
  ports:
    - port: 5044
      targetPort: tcp-input
      name: tcp-input
    - port: 9600
      targetPort: monitoring
      name: monitoring
  selector:
    app.kubernetes.io/name: logstash
