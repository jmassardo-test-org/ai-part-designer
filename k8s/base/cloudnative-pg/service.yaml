---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: ai-part-designer
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: ai-part-designer
spec:
  type: ClusterIP
  selector:
    postgresql: postgres-cluster
    role: primary
  ports:
  - name: postgres
    port: 5432
    targetPort: 5432
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-pooler-service
  namespace: ai-part-designer
  labels:
    app.kubernetes.io/name: postgres-pooler
    app.kubernetes.io/component: database-pooler
    app.kubernetes.io/part-of: ai-part-designer
spec:
  type: ClusterIP
  selector:
    cnpg.io/poolerName: postgres-pooler
  ports:
  - name: pgbouncer
    port: 5432
    targetPort: 5432
    protocol: TCP
