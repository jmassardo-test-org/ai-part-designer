---
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: postgres-pooler
  namespace: ai-part-designer
  labels:
    app.kubernetes.io/name: postgres-pooler
    app.kubernetes.io/component: database-pooler
    app.kubernetes.io/part-of: ai-part-designer
spec:
  cluster:
    name: postgres-cluster
  
  instances: 2
  type: rw
  
  pgbouncer:
    poolMode: session
    parameters:
      max_client_conn: "1000"
      default_pool_size: "25"
      max_db_connections: "100"
      max_user_connections: "100"
      reserve_pool_size: "5"
      reserve_pool_timeout: "5"
      log_connections: "0"
      log_disconnections: "0"
      server_idle_timeout: "600"
      server_lifetime: "3600"
      server_connect_timeout: "15"
      query_timeout: "0"
      stats_period: "60"
  
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres-pooler
        app.kubernetes.io/component: database-pooler
        app.kubernetes.io/part-of: ai-part-designer
    spec:
      containers:
      - name: pgbouncer
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: postgres-pooler
              topologyKey: kubernetes.io/hostname
