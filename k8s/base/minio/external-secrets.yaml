---
# ExternalSecret for MinIO root credentials
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: minio-credentials
  namespace: ai-part-designer
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: storage
    app.kubernetes.io/part-of: ai-part-designer
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-secret-store
    kind: SecretStore
  target:
    name: minio-credentials
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        root-user: "{{ .rootUser }}"
        root-password: "{{ .rootPassword }}"
  data:
  - secretKey: rootUser
    remoteRef:
      key: secret/ai-part-designer/storage/minio-credentials
      property: root_user
  - secretKey: rootPassword
    remoteRef:
      key: secret/ai-part-designer/storage/minio-credentials
      property: root_password
---
# ExternalSecret for MinIO mc (client) configuration
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: minio-mc-config
  namespace: ai-part-designer
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: storage
    app.kubernetes.io/part-of: ai-part-designer
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-secret-store
    kind: SecretStore
  target:
    name: minio-mc-config
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        mc-host: "http://{{ .rootUser }}:{{ .rootPassword }}@minio:9000"
  data:
  - secretKey: rootUser
    remoteRef:
      key: secret/ai-part-designer/storage/minio-credentials
      property: root_user
  - secretKey: rootPassword
    remoteRef:
      key: secret/ai-part-designer/storage/minio-credentials
      property: root_password
---
# ExternalSecret for application access to MinIO
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: minio-app-credentials
  namespace: ai-part-designer
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: storage
    app.kubernetes.io/part-of: ai-part-designer
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-secret-store
    kind: SecretStore
  target:
    name: minio-app-credentials
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        access-key-id: "{{ .accessKeyId }}"
        secret-access-key: "{{ .secretAccessKey }}"
        endpoint-url: "http://minio:9000"
  data:
  - secretKey: accessKeyId
    remoteRef:
      key: secret/ai-part-designer/storage/minio-app-credentials
      property: access_key_id
  - secretKey: secretAccessKey
    remoteRef:
      key: secret/ai-part-designer/storage/minio-app-credentials
      property: secret_access_key
