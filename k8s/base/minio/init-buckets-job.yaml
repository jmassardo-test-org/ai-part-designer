---
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init-buckets
  namespace: ai-part-designer
  labels:
    app.kubernetes.io/name: minio-init
    app.kubernetes.io/component: storage
    app.kubernetes.io/part-of: ai-part-designer
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio-init
        app.kubernetes.io/component: storage
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
      - name: wait-for-minio
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          echo "Waiting for MinIO to be ready..."
          until wget -q -O- http://minio:9000/minio/health/live > /dev/null 2>&1; do
            echo "MinIO not ready, sleeping 5s..."
            sleep 5
          done
          echo "MinIO is ready!"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      containers:
      - name: mc
        image: minio/mc:RELEASE.2024-02-16T11-05-48Z
        imagePullPolicy: IfNotPresent
        env:
        - name: MC_HOST_minio
          valueFrom:
            secretKeyRef:
              name: minio-mc-config
              key: mc-host
        command:
        - /bin/sh
        - -c
        - |
          set -e
          
          echo "Creating buckets..."
          
          # User uploads bucket
          mc mb minio/user-uploads --ignore-existing
          mc anonymous set none minio/user-uploads
          
          # CAD exports bucket
          mc mb minio/cad-exports --ignore-existing
          mc anonymous set download minio/cad-exports
          
          # Design thumbnails bucket (public read)
          mc mb minio/design-thumbnails --ignore-existing
          mc anonymous set download minio/design-thumbnails
          
          # Database backups bucket
          mc mb minio/db-backups --ignore-existing
          mc anonymous set none minio/db-backups
          
          # Environment-specific buckets with prefixes
          for env in development staging production; do
            # Designs bucket
            mc mb minio/ai-part-designer-${env}-designs --ignore-existing
            mc anonymous set none minio/ai-part-designer-${env}-designs
            
            # Exports bucket
            mc mb minio/ai-part-designer-${env}-exports --ignore-existing
            mc anonymous set download minio/ai-part-designer-${env}-exports
            
            # Thumbnails bucket
            mc mb minio/ai-part-designer-${env}-thumbnails --ignore-existing
            mc anonymous set download minio/ai-part-designer-${env}-thumbnails
            
            # Uploads bucket
            mc mb minio/ai-part-designer-${env}-uploads --ignore-existing
            mc anonymous set none minio/ai-part-designer-${env}-uploads
            
            # Temp bucket
            mc mb minio/ai-part-designer-${env}-temp --ignore-existing
            mc anonymous set none minio/ai-part-designer-${env}-temp
          done
          
          echo "Setting lifecycle policies..."
          
          # Temp bucket: Delete files older than 7 days
          cat > /tmp/temp-lifecycle.json <<EOF
          {
            "Rules": [
              {
                "ID": "ExpireTempFiles",
                "Status": "Enabled",
                "Expiration": {
                  "Days": 7
                },
                "Filter": {
                  "Prefix": ""
                }
              }
            ]
          }
          EOF
          
          for env in development staging production; do
            mc ilm import minio/ai-part-designer-${env}-temp < /tmp/temp-lifecycle.json || true
          done
          
          # DB backups: Keep last 30 days
          cat > /tmp/backup-lifecycle.json <<EOF
          {
            "Rules": [
              {
                "ID": "ExpireOldBackups",
                "Status": "Enabled",
                "Expiration": {
                  "Days": 30
                },
                "Filter": {
                  "Prefix": ""
                }
              }
            ]
          }
          EOF
          
          mc ilm import minio/db-backups < /tmp/backup-lifecycle.json || true
          
          echo "Bucket initialization complete!"
          mc ls minio/
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
