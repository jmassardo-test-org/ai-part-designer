---
# ExternalSecret for backend application secrets
# This syncs secrets from OpenBao to Kubernetes for use by the backend deployment
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: backend-secrets
  namespace: ai-part-designer
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: ai-part-designer
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-secret-store
    kind: SecretStore
  target:
    name: backend-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
  dataFrom:
  # Database credentials
  - extract:
      key: secret/ai-part-designer/database
      conversionStrategy: Default
      decodingStrategy: None
  # Redis credentials
  - extract:
      key: secret/ai-part-designer/redis
      conversionStrategy: Default
      decodingStrategy: None
  # Storage credentials (MinIO/S3)
  - extract:
      key: secret/ai-part-designer/storage/minio-app-credentials
      conversionStrategy: Default
      decodingStrategy: None
  # AI service credentials
  - extract:
      key: secret/ai-part-designer/ai-services/anthropic
      conversionStrategy: Default
      decodingStrategy: None
  # Auth secrets
  - extract:
      key: secret/ai-part-designer/auth/jwt-keys
      conversionStrategy: Default
      decodingStrategy: None
