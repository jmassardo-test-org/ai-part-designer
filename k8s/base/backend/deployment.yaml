---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: ai-part-designer
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: ai-part-designer
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: ai-part-designer
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: backend
        image: ai-part-designer-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        env:
        # Environment (overridden per overlay)
        - name: ENVIRONMENT
          value: "production"
        - name: DEBUG
          value: "false"
        # Database Configuration (from ConfigMap)
        - name: POSTGRES_HOST
          value: "postgres-service"
        - name: POSTGRES_PORT
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: POSTGRES_PORT
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: postgres-user
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: postgres-password
        # Redis Configuration (from ConfigMap)
        - name: REDIS_HOST
          value: "redis-service"
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: REDIS_PORT
        - name: REDIS_DB
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: REDIS_DB
        # Storage Configuration (from ConfigMap and Secrets)
        - name: STORAGE_BACKEND
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: STORAGE_BACKEND
        - name: S3_ENDPOINT_URL
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: S3_ENDPOINT_URL
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: access-key-id
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: secret-access-key
        - name: AWS_REGION
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: AWS_REGION
        - name: STORAGE_BUCKET_DESIGNS
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: STORAGE_BUCKET_DESIGNS
        - name: STORAGE_BUCKET_EXPORTS
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: STORAGE_BUCKET_EXPORTS
        - name: STORAGE_BUCKET_THUMBNAILS
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: STORAGE_BUCKET_THUMBNAILS
        # AI Provider Configuration (from ConfigMap and Secrets)
        - name: AI_PROVIDER
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: AI_PROVIDER
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: anthropic-api-key
        - name: ANTHROPIC_MODEL
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: ANTHROPIC_MODEL
        - name: AI_MAX_TOKENS
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: AI_MAX_TOKENS
        - name: AI_TEMPERATURE
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: AI_TEMPERATURE
        # Security Configuration (from Secrets and ConfigMap)
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: secret-key
        - name: CORS_ORIGINS
          value: '["https://app.example.com"]'
        - name: FRONTEND_URL
          value: "https://app.example.com"
        # Other settings from ConfigMap
        - name: ACCESS_TOKEN_EXPIRE_MINUTES
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: ACCESS_TOKEN_EXPIRE_MINUTES
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: LOG_LEVEL
        - name: CAD_V2_ENABLED
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: CAD_V2_ENABLED
        - name: CAD_V2_AS_DEFAULT
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: CAD_V2_AS_DEFAULT
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /api/v1/health
            port: http
          initialDelaySeconds: 0
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 30
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 1000
