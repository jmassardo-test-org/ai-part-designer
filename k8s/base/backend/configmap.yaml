---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: ai-part-designer
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: ai-part-designer
data:
  # Application Settings
  APP_NAME: "AssemblematicAI"
  APP_VERSION: "0.1.0"
  API_V1_PREFIX: "/api/v1"
  
  # Database - host will be overridden per environment
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "assemblematic_ai"
  
  # Redis - host will be overridden per environment
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  
  # Storage Backend (MinIO)
  STORAGE_BACKEND: "minio"
  AWS_REGION: "us-east-1"
  S3_ENDPOINT_URL: "http://minio:9000"
  STORAGE_BUCKET_DESIGNS: "designs"
  STORAGE_BUCKET_EXPORTS: "exports"
  STORAGE_BUCKET_THUMBNAILS: "thumbnails"
  STORAGE_BUCKET_UPLOADS: "uploads"
  STORAGE_BUCKET_TEMP: "temp"
  
  # AI Provider
  AI_PROVIDER: "anthropic"
  ANTHROPIC_MODEL: "claude-sonnet-4-20250514"
  AI_MAX_TOKENS: "4096"
  AI_TEMPERATURE: "0.3"
  
  # Security
  ACCESS_TOKEN_EXPIRE_MINUTES: "15"
  REFRESH_TOKEN_EXPIRE_DAYS: "7"
  ALGORITHM: "HS256"
  PASSWORD_MIN_LENGTH: "8"
  MAX_LOGIN_ATTEMPTS: "5"
  LOCKOUT_DURATION_MINUTES: "15"
  REQUIRE_EMAIL_VERIFICATION: "true"
  SESSION_TIMEOUT_MINUTES: "60"
  CONCURRENT_SESSION_LIMIT: "5"
  CORS_ALLOW_CREDENTIALS: "true"
  
  # Rate Limiting
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_PER_MINUTE: "60"
  RATE_LIMIT_PER_HOUR: "1000"
  
  # Job Processing
  CAD_WORKER_TIMEOUT: "300"
  MAX_CONCURRENT_JOBS: "10"
  JOB_RETRY_DELAY: "60"
  
  # File Upload
  MAX_UPLOAD_SIZE_MB: "50"
  
  # CAD System v2
  CAD_V2_ENABLED: "true"
  CAD_V2_AS_DEFAULT: "true"
  
  # Logging
  LOG_LEVEL: "INFO"
