---
# Database Migration Job
# Runs Alembic migrations against the deployed database.
#
# Usage:
#   kubectl apply -k k8s/overlays/dev
#   kubectl delete job db-migrate-dev -n ai-part-designer-dev --ignore-not-found  # re-run
#
# Migrations are idempotent — safe to run multiple times.
apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: ai-part-designer
  labels:
    app.kubernetes.io/name: db-migrate
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: ai-part-designer
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 3
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: db-migrate
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: ai-part-designer
    spec:
      serviceAccountName: backend
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: migrate
        image: ai-part-designer-backend:latest
        imagePullPolicy: IfNotPresent
        workingDir: /app
        command:
        - /bin/sh
        - -c
        - |
          set -e
          export PATH="/app/.venv/bin:$PATH"

          echo "=========================================="
          echo "  Database Migration - Starting"
          echo "=========================================="

          echo "Waiting for PostgreSQL at ${POSTGRES_HOST}:${POSTGRES_PORT}..."
          for i in $(seq 1 30); do
            if python -c "import socket,sys; s=socket.create_connection(('$POSTGRES_HOST',int('$POSTGRES_PORT')),timeout=5); s.close()" 2>/dev/null; then
              echo "  PostgreSQL is ready!"
              break
            fi
            echo "  Attempt $i/30 - not ready, retrying in 5s..."
            sleep 5
          done

          echo ""
          echo "Current migration status:"
          alembic current || echo "  (no migrations applied yet)"

          echo ""
          echo "Running migrations..."
          alembic upgrade head

          echo ""
          echo "New migration status:"
          alembic current

          echo ""
          echo "=========================================="
          echo "  Database Migration - Complete"
          echo "=========================================="
        env:
        # Database Configuration
        - name: ENVIRONMENT
          value: "production"
        - name: DEBUG
          value: "false"
        - name: POSTGRES_HOST
          value: "postgres-service"
        - name: POSTGRES_PORT
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: POSTGRES_PORT
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: postgres-user
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: postgres-password
        # Redis Configuration (required by app startup)
        - name: REDIS_HOST
          value: "redis-service"
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: REDIS_PORT
        - name: REDIS_DB
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: REDIS_DB
        # Storage Configuration (required by app startup)
        - name: STORAGE_BACKEND
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: STORAGE_BACKEND
        - name: S3_ENDPOINT_URL
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: S3_ENDPOINT_URL
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: access-key-id
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: secret-access-key
        - name: AWS_REGION
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: AWS_REGION
        - name: STORAGE_BUCKET_DESIGNS
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: STORAGE_BUCKET_DESIGNS
        - name: STORAGE_BUCKET_EXPORTS
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: STORAGE_BUCKET_EXPORTS
        - name: STORAGE_BUCKET_THUMBNAILS
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: STORAGE_BUCKET_THUMBNAILS
        # AI Provider (required by app startup)
        - name: AI_PROVIDER
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: AI_PROVIDER
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: anthropic-api-key
        - name: ANTHROPIC_MODEL
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: ANTHROPIC_MODEL
        - name: AI_MAX_TOKENS
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: AI_MAX_TOKENS
        - name: AI_TEMPERATURE
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: AI_TEMPERATURE
        # Security
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: secret-key
        - name: CORS_ORIGINS
          value: '["https://app.assemblematic.ai"]'
        - name: FRONTEND_URL
          value: "https://app.assemblematic.ai"
        - name: ACCESS_TOKEN_EXPIRE_MINUTES
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: ACCESS_TOKEN_EXPIRE_MINUTES
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: LOG_LEVEL
        - name: CAD_V2_ENABLED
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: CAD_V2_ENABLED
        - name: CAD_V2_AS_DEFAULT
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: CAD_V2_AS_DEFAULT
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
