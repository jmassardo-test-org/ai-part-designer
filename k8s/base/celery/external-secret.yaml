---
# ExternalSecret for celery worker secrets
# This syncs secrets from OpenBao to Kubernetes for use by celery workers
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: celery-worker-secrets
  namespace: ai-part-designer
  labels:
    app.kubernetes.io/name: celery-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: ai-part-designer
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-secret-store
    kind: SecretStore
  target:
    name: celery-worker-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
  dataFrom:
  # Database credentials
  - extract:
      key: secret/ai-part-designer/database
      conversionStrategy: Default
      decodingStrategy: None
  # Redis credentials
  - extract:
      key: secret/ai-part-designer/redis
      conversionStrategy: Default
      decodingStrategy: None
  # Storage credentials (MinIO/S3)
  - extract:
      key: secret/ai-part-designer/storage/minio-app-credentials
      conversionStrategy: Default
      decodingStrategy: None
  # AI service credentials
  - extract:
      key: secret/ai-part-designer/ai-services/anthropic
      conversionStrategy: Default
      decodingStrategy: None
