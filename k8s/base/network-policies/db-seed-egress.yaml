---
# Network policy for the db-seed Job.
# Only allows DNS resolution and PostgreSQL access — no other egress.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: db-seed-egress
  namespace: ai-part-designer
  labels:
    app.kubernetes.io/name: db-seed
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: ai-part-designer
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: db-seed
      app.kubernetes.io/component: database
  policyTypes:
  - Egress
  egress:
  # Allow DNS
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: UDP
      port: 53
  # Allow access to PostgreSQL
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  # Allow access to Redis (required by app startup)
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379
  # Allow access to MinIO (required by storage config)
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 9000
