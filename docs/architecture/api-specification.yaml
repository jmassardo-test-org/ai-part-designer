          type: boolean
        hasPrev:
          type: boolean

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
            requestId:
              type: string

  responses:
    BadRequest:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: VALIDATION_ERROR
              message: Request validation failed
              details:
                email: Invalid email format

    Unauthorized:
      description: Authentication required or token expired
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: UNAUTHORIZED
              message: Invalid or expired token

    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: FORBIDDEN
              message: You don't have permission to access this resource

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: NOT_FOUND
              message: Resource not found

    RateLimited:
      description: Rate limit exceeded
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds until rate limit resets
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: RATE_LIMITED
              message: Too many requests. Please try again later.

security:
  - bearerAuth: []

# =============================================================================
# WebSocket API Documentation
# =============================================================================
x-websocket:
  url: wss://api.aipartdesigner.com/ws
  description: |
    Real-time WebSocket connection for job progress and notifications.
    
    ## Connection
    Connect to `/ws?token=<jwt_token>` with a valid JWT token.
    
    ## Authentication
    The JWT token must be passed as a query parameter.
    
    ## Message Format
    All messages are JSON objects with a `type` field.
    
  messages:
    # Client -> Server
    subscribe:
      description: Subscribe to updates for a specific resource
      payload:
        type: object
        properties:
          type:
            type: string
            const: subscribe
          resource:
            type: string
            enum: [jobs, notifications]
          resourceId:
            type: string
            description: Optional ID for specific resource
        example:
          type: subscribe
          resource: jobs
          resourceId: job_123

    unsubscribe:
      description: Unsubscribe from updates
      payload:
        type: object
        properties:
          type:
            type: string
            const: unsubscribe
          resource:
            type: string
            enum: [jobs, notifications]
        example:
          type: unsubscribe
          resource: jobs

    ping:
      description: Keepalive ping
      payload:
        type: object
        properties:
          type:
            type: string
            const: ping
        example:
          type: ping

    # Server -> Client
    job_progress:
      description: Job progress update
      payload:
        type: object
        properties:
          type:
            type: string
            const: job_progress
          jobId:
            type: string
          status:
            type: string
            enum: [pending, running, completed, failed]
          progress:
            type: number
            minimum: 0
            maximum: 100
          step:
            type: string
            description: Current processing step
        example:
          type: job_progress
          jobId: job_123
          status: running
          progress: 45
          step: Generating CAD model...

    job_complete:
      description: Job completion notification
      payload:
        type: object
        properties:
          type:
            type: string
            const: job_complete
          jobId:
            type: string
          designId:
            type: string
          previewUrl:
            type: string
            format: uri
        example:
          type: job_complete
          jobId: job_123
          designId: design_456
          previewUrl: /uploads/designs/preview.glb

    job_failed:
      description: Job failure notification
      payload:
        type: object
        properties:
          type:
            type: string
            const: job_failed
          jobId:
            type: string
          error:
            type: string
        example:
          type: job_failed
          jobId: job_123
          error: Generation failed due to invalid parameters

    notification:
      description: User notification
      payload:
        type: object
        properties:
          type:
            type: string
            const: notification
          id:
            type: string
          title:
            type: string
          message:
            type: string
          category:
            type: string
            enum: [job, comment, share, system]
          createdAt:
            type: string
            format: date-time
        example:
          type: notification
          id: notif_789
          title: Design Ready
          message: Your motor mount design is ready for download
          category: job
          createdAt: "2026-01-26T12:00:00Z"

    pong:
      description: Keepalive pong response
      payload:
        type: object
        properties:
          type:
            type: string
            const: pong
        example:
          type: pong

    error:
      description: WebSocket error
      payload:
        type: object
        properties:
          type:
            type: string
            const: error
          code:
            type: string
          message:
            type: string
        example:
          type: error
          code: UNAUTHORIZED
          message: Invalid or expired token

